name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  web-client:
    name: audit_web_client (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: audit_web_client
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: audit_web_client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
