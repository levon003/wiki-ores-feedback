name: Dependabot auto-merge

# Enables GitHub's auto-merge for Dependabot patch & minor bumps. Auto-merge only
# completes once required status checks pass, so this is gated on the CI workflow.
#
# Prerequisites (one-time, in repo settings):
#   - Settings → General → "Allow auto-merge" must be enabled.
#   - A branch protection rule on `master` requiring the "audit_web_client
#     (lint + build)" check, so a bad bump can't merge if CI is red.
# Major version bumps are intentionally left for manual review.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch & minor updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
